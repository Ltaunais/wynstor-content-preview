<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wynstor SEO — Éditeur de contenu</title>
<style>
  :root { --pr: #6f42c1; --pr-light: #e8d5f5; --bg: #f5f5f5; --card: #fff; --border: #e9ecef; --gray: #6c757d; --ok: #198754; --warn: #ffc107; --bad: #dc3545; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #212529; background: var(--bg); }

  /* === LAYOUT 3 COLONNES === */
  .layout { display: grid; grid-template-columns: 240px 1fr 260px; min-height: 100vh; }

  /* === SIDEBAR GAUCHE : PAGES === */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray); margin-bottom: 12px; }
  .file-list { list-style: none; }
  .file-list li { margin-bottom: 2px; }
  .file-list a { display: block; padding: 7px 10px; border-radius: 5px; text-decoration: none; color: #212529; font-size: 13px; }
  .file-list a:hover { background: #f8f9fa; }
  .file-list a.active { background: var(--pr); color: #fff; }
  .file-list .cat-id { font-size: 10px; opacity: 0.6; margin-right: 3px; }

  /* === MAIN : ÉDITEUR === */
  .main { padding: 24px 32px; max-width: 960px; }

  /* Top bar */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .top-bar h1 { font-size: 18px; font-weight: 600; }
  .top-bar .actions { display: flex; gap: 8px; }
  .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card); }
  .btn:hover { background: #f8f9fa; }
  .btn-primary { background: var(--pr); color: #fff; border-color: var(--pr); }
  .btn-primary:hover { background: #5a32a3; }
  .btn-ok { background: var(--ok); color: #fff; border-color: var(--ok); }
  .btn-ok:hover { background: #157347; }
  .save-status { font-size: 12px; color: var(--gray); margin-right: 8px; line-height: 32px; }

  /* Meta editable */
  .meta-bar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
  .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .meta-row:last-child { margin-bottom: 0; }
  .meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--gray); min-width: 40px; }
  .meta-input { flex: 1; border: 1px solid transparent; padding: 4px 8px; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .meta-input:hover { border-color: var(--border); }
  .meta-input:focus { outline: none; border-color: var(--pr); background: #faf8fd; }
  .meta-chars { font-size: 10px; color: var(--gray); min-width: 50px; text-align: right; }

  /* Content editor */
  .editor { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px 32px; min-height: 400px; }

  /* Editable blocs */
  .bloc { position: relative; margin: 20px 0; padding: 12px; border: 1px dashed transparent; border-radius: 6px; transition: all 0.2s; }
  .bloc:hover { border-color: var(--pr); background: #fdfbff; }
  .bloc.editing { border-color: var(--pr); background: #faf8fd; box-shadow: 0 0 0 3px rgba(111,66,193,0.1); }
  .bloc-toolbar { display: none; position: absolute; top: -14px; right: 8px; background: var(--pr); border-radius: 4px; overflow: hidden; z-index: 10; }
  .bloc:hover .bloc-toolbar, .bloc.editing .bloc-toolbar { display: flex; }
  .bloc-toolbar button { background: none; border: none; color: #fff; padding: 3px 8px; font-size: 11px; cursor: pointer; }
  .bloc-toolbar button:hover { background: rgba(255,255,255,0.2); }

  /* Editable elements */
  .bloc [contenteditable] { outline: none; }
  .bloc [contenteditable]:focus { background: rgba(111,66,193,0.03); }

  /* === STYLE TOOLBAR (flottant) === */
  .style-toolbar {
    display: none; position: fixed; z-index: 9999;
    background: #1a1a2e; border: 1px solid #333; border-radius: 10px;
    padding: 6px 10px; gap: 4px; align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35); flex-wrap: wrap; max-width: 520px;
  }
  .style-toolbar.visible { display: flex; }
  .style-toolbar::after {
    content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid #1a1a2e;
  }
  .style-toolbar.below::after { bottom: auto; top: -6px; border-top: none; border-bottom: 6px solid #1a1a2e; }

  /* Toolbar groups */
  .tb-group { display: flex; align-items: center; gap: 2px; }
  .tb-sep { width: 1px; height: 20px; background: #444; margin: 0 6px; }
  .tb-label { color: #888; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }

  /* Toolbar buttons */
  .style-toolbar button {
    background: #2a2a3e; color: #ccc; border: 1px solid #3a3a4e; border-radius: 5px;
    padding: 4px 7px; cursor: pointer; font-size: 12px; min-width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center; transition: all 0.1s;
  }
  .style-toolbar button:hover { background: var(--pr); color: #fff; border-color: var(--pr); }
  .style-toolbar button.active { background: var(--pr); color: #fff; border-color: var(--pr); }

  /* Color inputs */
  .style-toolbar input[type="color"] {
    width: 26px; height: 26px; border: 1px solid #3a3a4e; border-radius: 5px;
    cursor: pointer; padding: 1px; background: #2a2a3e;
  }

  /* Number/select inputs */
  .style-toolbar input[type="number"], .style-toolbar select {
    width: 48px; background: #2a2a3e; color: #ccc; border: 1px solid #3a3a4e;
    border-radius: 5px; padding: 3px 4px; font-size: 11px; height: 26px;
  }
  .style-toolbar input[type="number"]:focus, .style-toolbar select:focus { border-color: var(--pr); outline: none; }

  /* Color presets */
  .color-presets { display: flex; gap: 3px; padding: 4px 0; }
  .color-preset {
    width: 18px; height: 18px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.1s;
  }
  .color-preset:hover { border-color: #fff; }

  /* === BLOCK PICKER MODAL === */
  .block-picker-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 10000; align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .block-picker-overlay.visible { display: flex; }
  .block-picker {
    background: var(--card); border-radius: 16px; width: 780px; max-width: 95vw;
    max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .bp-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
  }
  .bp-header h3 { font-size: 16px; font-weight: 600; }
  .bp-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray); padding: 4px 8px; border-radius: 6px; }
  .bp-close:hover { background: var(--border); }
  .bp-body { display: flex; flex: 1; overflow: hidden; }
  .bp-cats { width: 180px; border-right: 1px solid var(--border); padding: 12px 0; overflow-y: auto; flex-shrink: 0; }
  .bp-cat-btn {
    display: block; width: 100%; text-align: left; padding: 8px 20px;
    background: none; border: none; font-size: 13px; cursor: pointer; color: #333;
  }
  .bp-cat-btn:hover { background: #f8f9fa; }
  .bp-cat-btn.active { background: var(--pr); color: #fff; font-weight: 600; }
  .bp-grid { flex: 1; padding: 16px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; }
  .bp-card {
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    cursor: pointer; transition: all 0.15s;
  }
  .bp-card:hover { border-color: var(--pr); box-shadow: 0 4px 12px rgba(111,66,193,0.15); transform: translateY(-2px); }
  .bp-card-preview {
    height: 100px; background: #f8f9fa; overflow: hidden; padding: 8px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; transform: scale(0.45); transform-origin: top center;
    min-height: 200px; margin-top: -50px; margin-bottom: -50px;
  }
  .bp-card-info { padding: 10px 12px; border-top: 1px solid var(--border); }
  .bp-card-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .bp-card-desc { font-size: 11px; color: var(--gray); }
  .bp-card-fav {
    position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.9);
    border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15); transition: all 0.15s; z-index: 2;
  }
  .bp-card-fav:hover { transform: scale(1.15); }
  .bp-card-fav.faved { background: var(--pr); color: #fff; }
  .bp-card { position: relative; }
  .bp-cat-count { font-size: 10px; opacity: 0.6; margin-left: 4px; }

  @media (max-width: 768px) {
    .bp-cats { display: none; }
    .bp-grid { grid-template-columns: 1fr; }
  }

  .editor .ws-h2 { font-size: 18px; font-weight: 600; color: #212529; margin: 0 0 8px; padding-bottom: 6px; border-bottom: 2px solid var(--pr); }
  .editor p { font-size: 14px; line-height: 1.75; margin-bottom: 8px; color: #333; }
  .editor .ws-faq { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
  .editor .faq-item { margin-bottom: 12px; padding: 12px; background: #f8f9fa; border-radius: 6px; }
  .editor .ws-h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .editor .faq-item p { margin-bottom: 0; font-size: 13px; }

  /* Widget markers */
  .widget-link { background: var(--pr-light); color: var(--pr); padding: 1px 5px; border-radius: 3px; font-size: 12px; border: 1px dashed var(--pr); cursor: help; }

  /* Insert bar between blocs */
  .insert-bar { height: 24px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .insert-bar:hover { opacity: 1; }
  .insert-bar button { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; font-size: 16px; cursor: pointer; color: var(--pr); line-height: 1; }
  .insert-bar button:hover { background: var(--pr); color: #fff; }

  /* Stats */
  .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 11px; color: var(--gray); }
  .stat { display: flex; align-items: center; gap: 3px; }
  .stat-value { font-weight: 600; color: #212529; }
  .stat-ok { color: var(--ok) !important; }
  .stat-bad { color: var(--bad) !important; }

  /* Source */
  .source-area { display: none; margin-top: 12px; }
  .source-area.visible { display: block; }
  .source-area textarea { width: 100%; min-height: 300px; background: #1e1e1e; color: #d4d4d4; border: none; border-radius: 8px; padding: 16px; font-family: 'Fira Code', 'Consolas', monospace; font-size: 12px; line-height: 1.5; resize: vertical; }

  /* === SIDEBAR DROITE : TEMPLATES === */
  .templates { background: var(--card); border-left: 1px solid var(--border); padding: 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .templates h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray); margin-bottom: 12px; }
  .tpl-card { padding: 10px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px; cursor: grab; transition: all 0.15s; }
  .tpl-card:hover { border-color: var(--pr); background: #fdfbff; }
  .tpl-card:active { cursor: grabbing; }
  .tpl-card .tpl-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .tpl-card .tpl-desc { font-size: 11px; color: var(--gray); }
  .tpl-card .tpl-preview { margin-top: 6px; padding: 6px; background: #f8f9fa; border-radius: 4px; font-size: 10px; color: var(--gray); line-height: 1.4; max-height: 60px; overflow: hidden; }
  .tpl-section { margin-bottom: 16px; }
  .tpl-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--pr); margin-bottom: 8px; }

  /* Token modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--card); border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw; }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .modal p { font-size: 13px; color: var(--gray); margin-bottom: 12px; }
  .modal input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; background: #212529; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200; display: none; }
  .toast.visible { display: block; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 1024px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar, .templates { position: static; height: auto; border: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR GAUCHE -->
  <div class="sidebar">
    <h2>Pages</h2>
    <ul class="file-list" id="fileList">
      <!-- Chargé dynamiquement depuis pages.json -->
    </ul>
    <div style="margin-top:24px">
      <h2>Config</h2>
      <button class="btn" style="width:100%;margin-bottom:6px" onclick="showTokenModal()">Token GitHub</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="top-bar">
      <h1 id="pageTitle">Chargement...</h1>
      <div class="actions">
        <span class="save-status" id="saveStatus"></span>
        <button class="btn btn-primary" onclick="openPreview()">Preview Wynstor</button>
        <button class="btn" onclick="toggleSource()">Source</button>
        <button class="btn btn-ok" onclick="saveToGithub()">Sauvegarder</button>
      </div>
    </div>

    <div class="meta-bar" id="metaBar"></div>
    <div class="editor" id="editor">Chargement...</div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="source-area" id="sourceArea">
      <textarea id="sourceCode" spellcheck="false"></textarea>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn" onclick="applySource()">Appliquer les modifications source</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR DROITE : TEMPLATES (chargées depuis blocks.json) -->
  <div class="templates" id="templatesPanel">
    <h2>Blocs</h2>
    <div id="blocksContainer">Chargement...</div>
  </div>
</div>

<!-- BLOCK PICKER MODAL -->
<div class="block-picker-overlay" id="blockPickerOverlay">
  <div class="block-picker">
    <div class="bp-header">
      <h3>Insérer un bloc</h3>
      <button class="bp-close" onclick="closeBlockPicker()">&times;</button>
    </div>
    <div class="bp-body">
      <div class="bp-cats" id="bpCats"></div>
      <div class="bp-grid" id="bpGrid"></div>
    </div>
  </div>
</div>

<!-- STYLE TOOLBAR -->
<div class="style-toolbar" id="styleToolbar">
  <!-- Texte -->
  <div class="tb-group">
    <button data-cmd="bold" title="Gras"><b>B</b></button>
    <button data-cmd="italic" title="Italique"><i>I</i></button>
    <button data-cmd="underline" title="Souligné"><u>U</u></button>
  </div>
  <div class="tb-sep"></div>

  <!-- Alignement -->
  <div class="tb-group">
    <button data-cmd="justifyLeft" title="Gauche">&#8676;</button>
    <button data-cmd="justifyCenter" title="Centre">&#8596;</button>
    <button data-cmd="justifyRight" title="Droite">&#8677;</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Taille police -->
  <div class="tb-group">
    <span class="tb-label">Px</span>
    <input type="number" id="stFontSize" min="10" max="48" value="14" title="Taille police">
  </div>
  <div class="tb-sep"></div>

  <!-- Couleur texte -->
  <div class="tb-group">
    <span class="tb-label">Txt</span>
    <input type="color" id="stColor" value="#333333" title="Couleur texte">
  </div>

  <!-- Couleur fond -->
  <div class="tb-group">
    <span class="tb-label">Fond</span>
    <input type="color" id="stBgColor" value="#ffffff" title="Couleur de fond">
    <button id="stBgNone" title="Fond transparent" style="font-size:10px">&#8709;</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Padding -->
  <div class="tb-group">
    <span class="tb-label">Pad</span>
    <input type="number" id="stPadding" min="0" max="80" value="12" title="Padding (px)">
  </div>

  <!-- Border radius -->
  <div class="tb-group">
    <span class="tb-label">Rad</span>
    <input type="number" id="stRadius" min="0" max="50" value="0" title="Border radius (px)">
  </div>
  <div class="tb-sep"></div>

  <!-- Presets couleurs Wynstor -->
  <div class="tb-group">
    <span class="tb-label">WS</span>
    <div class="color-presets" id="colorPresets"></div>
  </div>
</div>

<!-- TOKEN MODAL -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>Token GitHub</h3>
    <p>Token avec permission <code>repo</code> pour sauvegarder les modifications. Stocké en localStorage uniquement.</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="modal-actions">
      <button class="btn" onclick="hideTokenModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveToken()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// === CONFIG ===
const REPO = 'Ltaunais/wynstor-content-preview';
const BRANCH = 'main';

// === STATE ===
let currentFile = null;
let currentRawHtml = '';
let currentSha = null;
let dirty = false;

// === TEMPLATES (chargés depuis blocks.json) ===
let TEMPLATES = {};
let blocksData = null;

async function loadBlocks() {
  try {
    const res = await fetch('blocks.json');
    blocksData = await res.json();
    const container = document.getElementById('blocksContainer');
    container.textContent = '';

    blocksData.categories.forEach(cat => {
      const section = document.createElement('div');
      section.className = 'tpl-section';

      const h3 = document.createElement('h3');
      h3.textContent = cat.name;
      section.appendChild(h3);

      cat.blocks.forEach(block => {
        TEMPLATES[block.id] = block.html;

        const card = document.createElement('div');
        card.className = 'tpl-card';
        card.draggable = true;
        card.dataset.tpl = block.id;

        const name = document.createElement('div');
        name.className = 'tpl-name';
        name.textContent = block.name;
        card.appendChild(name);

        const desc = document.createElement('div');
        desc.className = 'tpl-desc';
        desc.textContent = block.desc;
        card.appendChild(desc);

        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', block.id);
        });

        section.appendChild(card);
      });

      container.appendChild(section);
    });
  } catch(e) {
    const container = document.getElementById('blocksContainer');
    container.textContent = 'Erreur chargement blocks.json';
  }
}

// === BLACKLIST ===
const BL_VERBS = /\b(offre|permet|propose|assure|dispose de|bénéficie de|se distingue|séduit|accompagne|facilite|optimise)\b/gi;
const BL_ADJ = /\b(idéal|parfait|optimal|performant|polyvalent|ergonomique|robuste|fiable|innovant|premium|incontournable|exceptionnel|remarquable|essentiel|indispensable)\b/gi;
const BL_EXPR = /(découvrez|n'hésitez pas|conçu pour|que vous soyez|grâce à|large gamme|vaste choix|en effet|de plus,|par ailleurs,|néanmoins|toutefois|cependant)/gi;

// === TOKEN ===
function getToken() { return localStorage.getItem('gh_token') || ''; }
function showTokenModal() { document.getElementById('tokenModal').classList.add('visible'); document.getElementById('tokenInput').value = getToken(); }
function hideTokenModal() { document.getElementById('tokenModal').classList.remove('visible'); }
function saveToken() { localStorage.setItem('gh_token', document.getElementById('tokenInput').value.trim()); hideTokenModal(); toast('Token enregistré'); }

// === TOAST ===
function toast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), duration);
}

// === LOAD FILE ===
async function loadFile(filename) {
  currentFile = filename;
  document.getElementById('pageTitle').textContent = filename.replace('.html','');
  document.querySelectorAll('.file-list a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-file="${filename}"]`)?.classList.add('active');

  // Fetch from GitHub API to get SHA
  const token = getToken();
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${filename}?ref=${BRANCH}`, {
      headers: token ? { 'Authorization': `token ${token}` } : {}
    });
    const data = await res.json();
    currentSha = data.sha;
    currentRawHtml = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  } catch(e) {
    // Fallback: fetch raw
    const res = await fetch(filename);
    currentRawHtml = await res.text();
    currentSha = null;
  }

  renderMeta();
  renderEditor();
  updateStats();
  dirty = false;
  document.getElementById('saveStatus').textContent = '';
}

// === RENDER META ===
function renderMeta() {
  const m = currentRawHtml.match(/Title: (.+)\n\s+Meta: (.+)\n\s+H1: (.+)/);
  const bar = document.getElementById('metaBar');

function renderEditor() {
  let html = currentRawHtml.replace(/<!--[\s\S]*?-->/g, '').replace(/<script[\s\S]*?<\/script>/g, '').trim();

  // Replace widgets with visual markers
  html = html.replace(
    /\{\{widget[^}]*anchor_text="([^"]+)"[^}]*id_path="([^"]+)"[^}]*\}\}/g,
    '<span class="widget-link" title="$2" contenteditable="false">$1</span>'
  );

  // Wrap blocs around h2 sections
  let idx = 0;
  const blocs = html.split(/(?=<h2|<div class="ws-faq)/);

  const editor = document.getElementById('editor');
  editor.innerHTML = '';

  blocs.forEach((b, i) => {
    if (!b.trim()) return;
    const div = document.createElement('div');
    div.className = 'bloc';
    div.innerHTML = `
      <div class="bloc-toolbar">
        <button onclick="moveBloc(this,-1)" title="Monter">&#8593;</button>
        <button onclick="moveBloc(this,1)" title="Descendre">&#8595;</button>
        <button onclick="deleteBloc(this)" title="Supprimer">&#10005;</button>
      </div>
      <div class="bloc-content" contenteditable="true" oninput="markDirty()">${b.trim()}</div>
    `;

    const insertBar = document.createElement('div');
    insertBar.className = 'insert-bar';
    insertBar.innerHTML = '<button onclick="showInsertMenu(this)" title="Insérer un bloc">+</button>';
    editor.appendChild(insertBar);
    editor.appendChild(div);
  });

  // Final insert bar
  const finalBar = document.createElement('div');
  finalBar.className = 'insert-bar';
  finalBar.innerHTML = '<button onclick="showInsertMenu(this)" title="Insérer un bloc">+</button>';
  editor.appendChild(finalBar);
}

// === BLOC ACTIONS ===
function moveBloc(btn, dir) {
  const bloc = btn.closest('.bloc');
  const insertBar = bloc.previousElementSibling;
  if (dir === -1 && insertBar?.previousElementSibling?.classList.contains('bloc')) {
    const target = insertBar.previousElementSibling;
    const targetBar = target.previousElementSibling;
    bloc.parentNode.insertBefore(insertBar, targetBar);
    bloc.parentNode.insertBefore(bloc, targetBar);
  } else if (dir === 1 && bloc.nextElementSibling?.nextElementSibling?.classList.contains('bloc')) {
    const nextBar = bloc.nextElementSibling;
    const nextBloc = nextBar.nextElementSibling;
    const nextNextBar = nextBloc.nextElementSibling;
    bloc.parentNode.insertBefore(bloc, nextNextBar);
    bloc.parentNode.insertBefore(insertBar, bloc);
  }
  markDirty();
}

function deleteBloc(btn) {
  if (!confirm('Supprimer ce bloc ?')) return;
  const bloc = btn.closest('.bloc');
  const insertBar = bloc.previousElementSibling;
  if (insertBar?.classList.contains('insert-bar')) insertBar.remove();
  bloc.remove();
  markDirty();
}

let pendingInsertBar = null;

// Favoris en localStorage
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('ws_fav_blocks') || '[]'); } catch(e) { return []; }
}
function saveFavorites(favs) { localStorage.setItem('ws_fav_blocks', JSON.stringify(favs)); }
function isFavorite(id) { return getFavorites().includes(id); }
function toggleFavorite(id) {
  let favs = getFavorites();
  if (favs.includes(id)) { favs = favs.filter(f => f !== id); }
  else { favs.push(id); }
  saveFavorites(favs);
  return favs.includes(id);
}

// Chercher un bloc par ID dans blocksData
function findBlock(id) {
  for (const cat of blocksData.categories) {
    for (const b of cat.blocks) {
      if (b.id === id) return b;
    }
  }
  return null;
}

function showInsertMenu(btn) {

}

function openBlockPicker() {
  if (!blocksData) return;
  const overlay = document.getElementById('blockPickerOverlay');
  const catsDiv = document.getElementById('bpCats');

  catsDiv.textContent = '';

  // Bouton Favoris en premier

  favBadge.className = 'bp-cat-count';
  favBadge.textContent = favCount > 0 ? '(' + favCount + ')' : '';
  favBtn.appendChild(favBadge);
  favBtn.addEventListener('click', () => {
    catsDiv.querySelectorAll('.bp-cat-btn').forEach(b => b.classList.remove('active'));
    favBtn.classList.add('active');
    renderPickerGrid('__favs__');
  });
  catsDiv.appendChild(favBtn);

  // Bouton Tous
  const allBtn = document.createElement('button');
  allBtn.className = 'bp-cat-btn' + (favCount === 0 ? ' active' : '');
  allBtn.textContent = 'Tous';
  allBtn.addEventListener('click', () => {
    catsDiv.querySelectorAll('.bp-cat-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');

    countSpan.className = 'bp-cat-count';

    btn.appendChild(countSpan);
    btn.addEventListener('click', () => {
      catsDiv.querySelectorAll('.bp-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPickerGrid(cat.name);
    });
    catsDiv.appendChild(btn);
  });

  // Afficher favoris si y en a, sinon tous
  renderPickerGrid(favCount > 0 ? '__favs__' : null);

function renderPickerGrid(filterCat) {
  const gridDiv = document.getElementById('bpGrid');
  gridDiv.textContent = '';

  let blocksToShow = [];

  if (filterCat === '__favs__') {
    const favs = getFavorites();
    favs.forEach(id => {
      const block = findBlock(id);
      if (block) blocksToShow.push(block);
    });
    if (blocksToShow.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'grid-column:1/-1;text-align:center;padding:40px;color:var(--gray);font-size:14px';
      empty.textContent = 'Pas encore de favoris. Cliquez sur l\'etoile d\'un bloc pour l\'ajouter ici.';
      gridDiv.appendChild(empty);
      return;
    }
  } else {
    blocksData.categories.forEach(cat => {
      if (filterCat && cat.name !== filterCat) return;
      cat.blocks.forEach(block => blocksToShow.push(block));
    });
  }

  blocksToShow.forEach(block => {
    const card = document.createElement('div');
    card.className = 'bp-card';

    // Bouton favori (étoile)
    const favStar = document.createElement('button');
    favStar.className = 'bp-card-fav' + (isFavorite(block.id) ? ' faved' : '');
    favStar.textContent = isFavorite(block.id) ? '\u2605' : '\u2606';
    favStar.title = 'Ajouter aux favoris';
    favStar.addEventListener('click', (e) => {
      e.stopPropagation();
      const nowFav = toggleFavorite(block.id);
      favStar.className = 'bp-card-fav' + (nowFav ? ' faved' : '');
      favStar.textContent = nowFav ? '\u2605' : '\u2606';
      // Mettre à jour le compteur dans la sidebar
      const favCountSpan = document.querySelector('.bp-cats .bp-cat-btn .bp-cat-count');
      if (favCountSpan) favCountSpan.textContent = '(' + getFavorites().length + ')';
    });
    card.appendChild(favStar);

    // Clic sur la carte = insérer
    card.addEventListener('click', () => {
      insertTemplate(pendingInsertBar, block.id);
      closeBlockPicker();
    });

    // Preview miniature
    const preview = document.createElement('div');
    preview.className = 'bp-card-preview';
    const previewContent = document.createElement('div');
    previewContent.style.cssText = 'width:100%;pointer-events:none';
    let previewHtml = block.html
      .replace(/\{\{widget[^}]*anchor_text="([^"]+)"[^}]*\}\}/g, '<span style="color:#6f42c1;text-decoration:underline">$1</span>')
      .replace(/<script[\s\S]*?<\/script>/g, '');
    previewContent.innerHTML = previewHtml;
    preview.appendChild(previewContent);
    card.appendChild(preview);

    // Info
    const info = document.createElement('div');
    info.className = 'bp-card-info';
    const name = document.createElement('div');
    name.className = 'bp-card-name';
    name.textContent = block.name;
    info.appendChild(name);
    const desc = document.createElement('div');
    desc.className = 'bp-card-desc';
    desc.textContent = block.desc;
    info.appendChild(desc);
    card.appendChild(info);

    gridDiv.appendChild(card);
  });

// === COLLECT HTML ===
function collectHtml() {
  // Rebuild meta comment
  const title = document.getElementById('metaTitle')?.value || '';
  const desc = document.getElementById('metaDesc')?.value || '';
  const h1 = document.getElementById('metaH1')?.value || '';

  let html = `<!-- ============================================\n`;
  html += `     ${currentFile?.replace('.html','') || 'page'}\n`;
  html += `     Bloc CMS Magento\n`;
  html += `     Lucas Wynstor — ${new Date().toISOString().split('T')[0]}\n\n`;
  html += `     Title: ${title} (${title.length} chars)\n`;
  html += `     Meta: ${desc} (${desc.length} chars)\n`;
  html += `     H1: ${h1}\n`;
  html += `     ============================================ -->\n\n`;

  // Collect blocs
  document.querySelectorAll('.bloc .bloc-content').forEach(bc => {
    let blocHtml = bc.innerHTML;
    // Restore widget markers to real widgets
    blocHtml = blocHtml.replace(
      /<span class="widget-link"[^>]*title="([^"]+)"[^>]*>([^<]+)<\/span>/g,
      (_, path, text) => `{{widget type="Magento\\Catalog\\Block\\Category\\Widget\\Link" anchor_text="${text}" id_path="${path}"}}`
    );
    html += blocHtml.trim() + '\n\n';
  });

  return html;
}

// === SAVE TO GITHUB ===
let isSaving = false;
let saveQueued = false;

async function fetchCurrentSha(token) {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFile}?ref=${BRANCH}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) {
      const data = await res.json();
      return data.sha;
    }
  } catch(e) {}
  return null;
}

async function saveToGithub() {
  const token = getToken();
  if (!token) { showTokenModal(); return; }

  // Si un save est déjà en cours, mettre en queue (1 seul)
  if (isSaving) { saveQueued = true; return; }
  isSaving = true;

  document.getElementById('saveStatus').textContent = 'Sauvegarde...';
  document.getElementById('saveStatus').style.color = 'var(--pr)';

  try {
    // Toujours récupérer le SHA frais avant d'écrire
    currentSha = await fetchCurrentSha(token);

    const content = collectHtml();
    const encoded = btoa(unescape(encodeURIComponent(content)));

    const body = {
      message: `update: ${currentFile}`,
      content: encoded,
      branch: BRANCH
    };
    if (currentSha) body.sha = currentSha;

    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFile}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const data = await res.json();
      currentSha = data.content.sha;
      currentRawHtml = content;
      dirty = false;
      document.getElementById('saveStatus').textContent = 'Sauvegardé';
      document.getElementById('saveStatus').style.color = 'var(--ok)';
    } else {
      const err = await res.json();
      document.getElementById('saveStatus').textContent = 'Erreur';
      document.getElementById('saveStatus').style.color = 'var(--bad)';
      toast('Erreur: ' + (err.message || res.status), 4000);
    }
  } catch(e) {
    document.getElementById('saveStatus').textContent = 'Erreur réseau';
    document.getElementById('saveStatus').style.color = 'var(--bad)';
    toast('Erreur réseau: ' + e.message, 4000);
  }

  isSaving = false;

  // Si un save était en queue, lancer le dernier
  if (saveQueued) {
    saveQueued = false;
    setTimeout(saveToGithub, 300);
  }
}

// === STATS ===
function updateStats() {
  const html = collectHtml();
  const text = html.replace(/<[^>]+>/g, '').replace(/\{\{[^}]+\}\}/g, '').replace(/<!--[\s\S]*?-->/g, '');
  const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
  const widgets = (html.match(/\{\{widget/g) || []).length;
  const h2s = (html.match(/<h2/g) || []).length;
  const faqs = (html.match(/faq-item/g) || []).length;
  const ratio = widgets > 0 ? Math.round(words / widgets) : 0;
  const ratioClass = ratio >= 100 ? 'stat-ok' : ratio >= 50 ? '' : 'stat-bad';

  const vHits = (text.match(BL_VERBS) || []);
  const aHits = (text.match(BL_ADJ) || []);
  const eHits = (text.match(BL_EXPR) || []);
  const dashHits = (html.match(/\u2014/g) || []);
  const total = vHits.length + aHits.length + eHits.length + dashHits.length;
  const blClass = total === 0 ? 'stat-ok' : 'stat-bad';
  const blWords = total > 0 ? ` (${[...vHits,...aHits,...eHits].join(', ')})` : '';

  document.getElementById('statsBar').innerHTML = `
    <div class="stat">Mots: <span class="stat-value">${words}</span></div>
    <div class="stat">H2: <span class="stat-value">${h2s}</span></div>
    <div class="stat">Liens: <span class="stat-value">${widgets}</span></div>
    <div class="stat">FAQ: <span class="stat-value">${faqs}</span></div>
    <div class="stat">Ratio: <span class="stat-value ${ratioClass}">${ratio} mots/lien</span></div>
    <div class="stat">Blacklist: <span class="stat-value ${blClass}">${total}${blWords}</span></div>
  `;
}

const WS_COLORS = [
  '#ffffff','#f8f9fa','#e9ecef','#212529',
  '#0061E2','#6f42c1','#9121ee',
  '#198754','#20c997',

(function initPresets() {

function rgbToHex(rgb) {
  if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return '#ffffff';
  if (rgb.startsWith('#')) return rgb;
  const match = rgb.match(/\d+/g);
  if (!match || match.length < 3) return '#000000';
  return '#' + match.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

function showStyleToolbar(el) {
  stActiveEl = el;
  const cs = getComputedStyle(el);

  // Lire les valeurs actuelles
  document.getElementById('stFontSize').value = parseInt(cs.fontSize) || 14;
  document.getElementById('stColor').value = rgbToHex(cs.color);
  document.getElementById('stBgColor').value = rgbToHex(cs.backgroundColor);
  document.getElementById('stPadding').value = parseInt(cs.padding) || 0;
  document.getElementById('stRadius').value = parseInt(cs.borderRadius) || 0;

  stToolbar.classList.add('visible');
  requestAnimationFrame(() => positionStyleToolbar(el));
}

function hideStyleToolbar() {
  stToolbar.classList.remove('visible');
  stActiveEl = null;
}

function positionStyleToolbar(el) {
  const rect = el.getBoundingClientRect();
  const tb = stToolbar.getBoundingClientRect();

  let left = rect.left + (rect.width / 2) - (tb.width / 2);
  let top = rect.top - tb.height - 10;

  // Si pas de place en haut, passer en bas
  if (top < 5) {
    top = rect.bottom + 10;
    stToolbar.classList.add('below');
  } else {
    stToolbar.classList.remove('below');
  }

  // Empêcher débordement horizontal
  left = Math.max(8, Math.min(left, window.innerWidth - tb.width - 8));

  stToolbar.style.left = left + 'px';
  stToolbar.style.top = top + 'px';
}

// Click detection — un seul listener global
document.addEventListener('click', (e) => {
  // Clic dans le toolbar lui-même = ne rien faire
  if (e.target.closest('.style-toolbar')) return;

  // Clic dans un bloc-content = ouvrir le toolbar
  const blocContent = e.target.closest('.bloc-content');
  if (blocContent) {
    let target = e.target;
    // Remonter jusqu'à un élément de bloc (h2, p, div, blockquote, etc.)
    // mais pas plus haut que bloc-content
    while (target && target !== blocContent && target.parentElement !== blocContent) {
      target = target.parentElement;
    }
    if (!target || target === blocContent) target = blocContent;
    showStyleToolbar(target);
    return;
  }

  // Clic dans le toolbar de bloc (move/delete) = ne rien faire
  if (e.target.closest('.bloc-toolbar')) return;

  // Clic ailleurs = fermer
  hideStyleToolbar();
});

  if (!stActiveEl) return;
  stActiveEl.style.padding = e.target.value + 'px';
  markDirty();
  requestAnimationFrame(() => positionStyleToolbar(stActiveEl));
});

document.getElementById('stRadius').addEventListener('input', (e) => {
  if (!stActiveEl) return;
  stActiveEl.style.borderRadius = e.target.value + 'px';
  markDirty();
});

// === PREVIEW WYNSTOR ===
let previewWindow = null;
function openPreview() {
  const html = collectHtml();
  const title = document.getElementById('metaTitle')?.value || '';
  const meta = document.getElementById('metaDesc')?.value || '';
  const h1 = document.getElementById('metaH1')?.value || '';

  previewWindow = window.open('preview.html', 'wynstor-preview', 'width=1460,height=900');

  // Listen for preview ready
  window.addEventListener('message', function handler(e) {
    if (e.data && e.data.type === 'wynstor-preview-ready') {
      previewWindow.postMessage({ type: 'wynstor-preview', html, title, meta, h1 }, '*');
      window.removeEventListener('message', handler);
    }
  });
}

// Auto-update preview on changes
function updatePreviewIfOpen() {
  if (previewWindow && !previewWindow.closed) {
    const html = collectHtml();
    const title = document.getElementById('metaTitle')?.value || '';
    const meta = document.getElementById('metaDesc')?.value || '';
    const h1 = document.getElementById('metaH1')?.value || '';
    previewWindow.postMessage({ type: 'wynstor-preview', html, title, meta, h1 }, '*');
  }
}

// Debounced preview update
let previewTimer = null;
const origMarkDirty = markDirty;
markDirty = function() {
  origMarkDirty();
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreviewIfOpen, 500);
};

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });
</script>
